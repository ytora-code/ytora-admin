# ==========================================================
# 使用方式：
#   这个文件建议作为模板文件，不要直接放到 nginx/conf.d 下使用。
#   部署时通过脚本替换 ${xxx} 占位符，生成真正的 .conf 文件。
# ==========================================================
server {
    # ======================================================
    # 1. 服务监听端口
    #
    # 作用：
    #   访问这个端口时，就会进入当前 server 配置。
    #
    # 示例：
    #   listen 8080;
    #
    # 访问地址：
    #   http://服务器IP:8080/
    # ======================================================
    listen ${LISTEN_PORT};

    # ======================================================
    # 2. 服务名称
    #
    # 作用：
    #   如果有域名，可以写域名。
    #   如果只是 IP + 端口访问，可以写 _。
    #
    # 示例：
    #   server_name _;
    #   server_name admin.example.com;
    # ======================================================
    server_name ${SERVER_NAME};

    # ======================================================
    # 3. 请求体大小限制
    #
    # 如果上传文件超过这个大小，Nginx 会直接返回:413 Request Entity Too Large
    #
    # 示例：
    #   client_max_body_size 100m;
    #   client_max_body_size 500m;
    # ======================================================
    client_max_body_size ${CLIENT_MAX_BODY_SIZE};

    # ======================================================
    # 4. 安全响应头:增加一些基础安全保护
    #
    # 这些配置一般不会影响普通后台管理系统。
    # 如果该系统需要被 iframe 嵌入，需要调整 X-Frame-Options。
    # ======================================================
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ======================================================
    # 5. SSE 专用接口配置
    #
    # API前缀的接口转发，同时增加了一些适配SSE连接的属性
    #
    # 前端请求：
    #   /api/system/sse/connect
    # 实际转发给后端：
    #   /system/sse/connect
    # ======================================================
    location = ${API_PREFIX}${BACKEND_CONTEXT_PATH}/sse/connect {

        # --------------------------------------------------
        # 去掉最前面的 API 前缀
        #
        # 举例：
        #   /api/system/sse/connect -> /system/sse/connect
        #
        # --------------------------------------------------
        rewrite ^${API_PREFIX}(.*)$ $1 break;

        proxy_pass ${BACKEND_ORIGIN};

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Accept-Encoding "";
        add_header X-Accel-Buffering no always;

        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        proxy_set_header Connection "";
    }


    # ======================================================
    # 6. 普通 API 接口配置
    #
    # 前端请求：
    #   /api/user/list
    # 实际转发给后端：
    #   /system/user/list
    #
    # 该 location 要放在前端 location 前面。
    # 否则 /api/xxx 可能会被当成前端路由处理。
    # ======================================================
    location ^~ ${API_PREFIX}${BACKEND_CONTEXT_PATH}/ {

        # --------------------------------------------------
        # 6.1 重写请求路径
        #
        # /api/user/list -> /system/user/list
        # --------------------------------------------------
        rewrite ^${API_PREFIX}(.*)$ $1 break;


        # --------------------------------------------------
        # 6.2 转发到后端服务
        #
        # 这里只写后端服务的协议、IP、端口，路径由 rewrite 负责处理。
        # --------------------------------------------------
        proxy_pass ${BACKEND_ORIGIN};


        # --------------------------------------------------
        # 6.3 使用 HTTP/1.1
        #
        # 兼容长连接、连接复用等场景。
        # --------------------------------------------------
        proxy_http_version 1.1;


        # --------------------------------------------------
        # 6.4 透传客户端信息
        #
        # 让后端能拿到真实客户端信息。
        # --------------------------------------------------
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;


        # --------------------------------------------------
        # 6.5 请求体缓冲区大小
        #
        # 上传文件时，Nginx 会先把请求体放入缓冲区，如果超过缓冲区，Nginx 会写入临时文件。
        #
        # 说明：
        #   写入临时文件不是错误，只是可能影响性能。
        #
        # 示例：
        #   client_body_buffer_size 10m;
        # --------------------------------------------------
        client_body_buffer_size ${CLIENT_BODY_BUFFER_SIZE};


        # --------------------------------------------------
        # 6.6 客户端上传超时
        #
        # 如果客户端上传文件太慢，超过这个时间，Nginx 会断开请求。
        #
        # 有文件上传时，可以适当调大。
        # --------------------------------------------------
        client_body_timeout 300s;


        # --------------------------------------------------
        # 6.7 请求体是否先由 Nginx 收完整再转发
        #
        # on：
        #   Nginx 先完整接收上传文件，再转发给后端。
        #   优点是稳定，后端压力较小。
        #   适合普通后台文件上传。
        #
        # off：
        #   Nginx 边接收边转发给后端。
        #   适合超大文件、流式上传。
        #   但后端需要能稳定处理流式请求。
        #
        # 推荐：
        #   普通系统保持 on。
        # --------------------------------------------------
        proxy_request_buffering on;


        # --------------------------------------------------
        # 6.8 普通接口超时配置
        #
        # proxy_connect_timeout：
        #   连接后端超时时间。
        #
        # proxy_send_timeout：
        #   向后端发送请求超时时间。
        #
        # proxy_read_timeout：
        #   等待后端响应超时时间。
        #
        # 说明：
        #   普通 API 不建议设置得像 SSE 那么长。
        #   否则后端接口卡死时，连接会占用太久。
        # --------------------------------------------------
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }


    # ======================================================
    # 7. 前端静态资源长期缓存
    #
    # js、css、图片、字体等静态资源可以让浏览器缓存一段时间。
    #
    # 好处：
    #   1. 提升页面加载速度
    #   2. 减少服务器压力
    #
    # 注意：
    #   现代前端打包工具通常会给 js/css 文件名加 hash。
    #   例如：
    #     app.8f3a1c2.js
    #
    #   这种文件名内容变了，文件名也会变，所以适合缓存。
    # ======================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {

        # --------------------------------------------------
        # 7.1 前端静态资源目录
        #
        # alias 表示：
        #   把请求路径映射到指定的磁盘目录。
        #
        # 例如：
        #   请求 /admin/assets/app.js
        #   会去 ${FRONTEND_DIST_PATH}/assets/app.js 找文件。
        # --------------------------------------------------
        alias ${FRONTEND_DIST_PATH}/;


        # --------------------------------------------------
        # 7.2 静态资源缓存时间
        #
        # 作用：
        #   告诉浏览器这些文件可以缓存 7 天。
        #
        # 可选：
        #   expires 7d;
        #   expires 30d;
        #   expires 365d;
        # --------------------------------------------------
        expires 7d;


        # --------------------------------------------------
        # 7.3 静态资源不记录访问日志
        #
        # 作用：
        #   减少日志量。
        #
        # 如果你需要排查静态资源访问问题，可以临时打开。
        # --------------------------------------------------
        access_log off;


        # --------------------------------------------------
        # 7.4 文件不存在则返回 404
        #
        # 作用：
        #   静态资源不存在时，不要回退到 index.html。
        #   否则浏览器可能把 index.html 当成 js/css 加载，导致报错。
        # --------------------------------------------------
        try_files $uri =404;
    }


    # ======================================================
    # 8. 前端页面入口配置
    #
    # 前端基础访问路径：
    #   ${FRONTEND_BASE_PATH}
    #
    # 常见值：
    #   /
    #   /admin/
    #
    # 作用：
    #   访问前端页面时，从前端打包目录中读取文件。
    #
    # 支持：
    #   Vue Router history 模式
    #   React Router BrowserRouter 模式
    #
    # 举例：
    #   前端路由：
    #     /admin/system/user
    #
    #   这个路径在磁盘上通常不存在。
    #   所以需要回退到：
    #     /admin/index.html
    #
    #   然后交给前端路由处理。
    # ======================================================
    location ^~ ${FRONTEND_BASE_PATH} {

        # --------------------------------------------------
        # 8.1 前端打包目录
        #
        # 指定 dist 所在目录。
        #
        # 示例：
        #   alias /data/www/admin/dist/;
        #
        # 注意：
        #   alias 后面建议带 /
        # --------------------------------------------------
        alias ${FRONTEND_DIST_PATH}/;


        # --------------------------------------------------
        # 8.2 默认首页
        #
        # 访问目录时，默认返回 index.html。
        # --------------------------------------------------
        index index.html;


        # --------------------------------------------------
        # 8.3 前端 history 路由支持
        #
        # 作用：
        #   先按真实文件查找。
        #   如果文件不存在，则返回前端入口 index.html。
        #
        # 举例：
        #   /admin/assets/app.js
        #   如果文件存在，就返回 app.js。
        #
        #   /admin/system/user
        #   如果文件不存在，就返回 /admin/index.html。
        #
        # 这样刷新页面不会 404。
        # --------------------------------------------------
        try_files $uri $uri/ ${FRONTEND_BASE_PATH}index.html;
    }
}