# ==========================================================
# 执行 generate.sh。
#   configs/admin.properties -> output/admin.conf
#
# 注意：
#   1. 使用 key=value 格式
#   2. 等号两边不要加空格
#   3. 配置值不要加引号
# ==========================================================


# Nginx 对外监听端口
LISTEN_PORT=8765

# 服务名称：IP + 端口访问填 _，域名访问填具体域名
SERVER_NAME=_

# 前端基础访问路径
FRONTEND_BASE_PATH=/

# 前端打包后的 dist 目录
FRONTEND_DIST_PATH=/opt/app/ytora/dist

# 前端 API 代理前缀，必须以 / 开头，末尾不要加 /
API_PREFIX=/api

# 后端 context-path，必须以 / 开头，末尾不要加 /
BACKEND_CONTEXT_PATH=/ytora

# 后端服务地址，只写协议、IP/域名、端口，末尾不要加 /
BACKEND_ORIGIN=http://127.0.0.1:9876

# 上传文件最大大小，超过会返回 413
CLIENT_MAX_BODY_SIZE=100m

# 请求体缓冲区大小，普通后台系统一般 1m~10m 即可
CLIENT_BODY_BUFFER_SIZE=10m